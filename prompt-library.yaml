# Prompt Library — STOPA Generative Prompt Templates
# Self-optimizing: templates se vylepšují přes /prompt-evolve (GEPA-inspired)
# Verze se inkrementuje po každé úspěšné optimalizaci
#
# Struktura:
#   category.subcategory:
#     template: "prompt text"
#     version: N
#     score: float (0-1, poslední eval score)
#     optimized_at: YYYY-MM-DD
#     notes: "co se změnilo"

