# Orchestration Tier Definitions
# Shared reference for orchestrate + budget skills

tiers:
  light:
    criteria: "Single file, known pattern, quick fix"
    agent_limit: 1
    critic_limit: 1
    model: haiku
    keywords: [fix, typo, rename, update, bump, tweak]
    file_range: [1, 1]

  standard:
    criteria: "Multi-file, some exploration needed"
    agent_limit: 4
    critic_limit: 2
    model: sonnet
    keywords: [refactor, "add feature", implement, migrate, extend, integrate]
    file_range: [2, 5]

  deep:
    criteria: "Cross-cutting, unknown scope, major feature"
    agent_limit: 8
    critic_limit: 3
    model: opus
    keywords: [redesign, architecture, cross-cutting, "security audit", "unknown scope", major]
    file_range: [6, 19]

  farm:
    criteria: "Bulk mechanical improvement across many files"
    agent_limit: 8
    critic_limit: 1
    model: sonnet
    keywords: ["all files", everywhere, bulk, "lint fix", "20+", mechanical]
    file_range: [20, 999]

# Circuit breakers (hard stops)
circuit_breakers:
  agent_loop: 3       # same agent on same subtask
  critic_loop: 2      # FAIL on same target
  memory_bloat: 500   # lines per memory file
  nesting_depth: 2    # max agent nesting levels

# Cost optimization levers
cost_levers:
  - lever: "Sub-agents on Haiku"
    savings: "~10x cheaper"
    when: "Validation, grep, explore"
  - lever: "effort: low"
    savings: "~50-70% thinking tokens"
    when: "Mechanical subtasks"
  - lever: "/compact when context > 50%"
    savings: "Reduces cache creation"
    when: "Long sessions"
  - lever: "Fewer agent spawns"
    savings: "Direct cost reduction"
    when: "Light/standard tier"

# L_task Difficulty Dimensions (ASI-Evolve, arXiv:2603.29640)
# Three dimensions independently scored, summed to derive tier
ltask_model:
  dimensions:
    c_exec:
      description: "Estimated compute cost per trial (agent count, model tier)"
      levels:
        none:  {score: 0, signals: ["single file", "haiku", "1 agent"]}
        light: {score: 1, signals: ["sonnet", "2-4 agents", "feature"]}
        heavy: {score: 2, signals: ["opus", "5+ agents", "architecture", "multi-wave"]}
    s_space:
      description: "Search space breadth (file count, cross-cutting scope)"
      levels:
        narrow:   {score: 0, signals: ["1-2 files", "known path"]}
        moderate: {score: 1, signals: ["3-10 files", "module-scoped"]}
        broad:    {score: 2, signals: ["11+ files", "cross-module"]}
        unknown:  {score: 3, signals: ["unknown scope", "investigate", "audit"]}
    d_feedback:
      description: "Feedback signal quality (tests, metrics, manual review)"
      levels:
        strong: {score: 0, signals: ["test suite", "benchmark", "coverage"]}
        weak:   {score: 1, signals: ["partial tests", "linter only"]}
        manual: {score: 2, signals: ["no tests", "only visual review", "manual check"]}
  tier_thresholds:
    light:    {min: 0, max: 1}
    standard: {min: 2, max: 3}
    deep:     {min: 4, max: 5}
    farm:     {min: 6, max: 7}
  usage: "python ${CLAUDE_SKILL_DIR}/scripts/tier-detector.py --ltask --c-exec <level> --s-space <level> --d-feedback <level>"
