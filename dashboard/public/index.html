<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOPA — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--panel:rgba(10,12,18,0.94);--text:#d4d8e0;--dim:#5a6270;
  --border:#1a1f2a;--border-bright:#2a3040;
  --accent:#c8b88a;--accent2:#38bdf8;
  --danger:#ef4444;--warn:#f59e0b;--positive:#22c55e;
  --mono:'IBM Plex Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border)}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.brand{font-family:var(--sans);font-weight:700;font-size:18px;letter-spacing:0.1em;color:var(--accent)}
.brand span{color:var(--dim);font-weight:400;font-size:11px;letter-spacing:0.02em;margin-left:8px}
.top-stats{display:flex;gap:12px;align-items:center}
.stat{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px}
.stat .v{color:var(--text);font-weight:600}
.stat .dot{width:6px;height:6px;border-radius:50%}
.dot.on{background:var(--positive)}
.dot.off{background:var(--danger)}

/* LAYOUT: sidebar + main */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* SIDEBAR PROJECT LIST */
.sidebar-header{padding:10px 14px;font-family:var(--sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);border-bottom:1px solid var(--border)}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;border-bottom:1px solid rgba(255,255,255,0.03)}
.sidebar-item:hover{background:rgba(255,255,255,0.02)}
.sidebar-item.active{border-left-color:var(--accent);background:rgba(200,184,138,0.06)}
.sidebar-item .si-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-item .si-name{font-family:var(--sans);font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .si-port{font-size:9px;color:var(--dim)}
.sidebar-item.running .si-dot{background:var(--positive)}
.sidebar-item.stopped .si-dot{background:var(--border-bright)}

/* OVERVIEW TAB */
.overview-tab{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.overview-tab label{font-family:var(--sans);font-size:11px;font-weight:500;padding:8px 16px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.overview-tab label:hover{color:var(--text)}
.overview-tab label.active{color:var(--accent);border-bottom-color:var(--accent)}
.ov-panel{display:none}
.ov-panel.active{display:block}

/* PROJECT HEADER */
.proj-header{margin-bottom:20px}
.proj-title{font-family:var(--sans);font-size:22px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.proj-title .status-badge{font-size:9px;padding:2px 8px;border:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em}
.proj-title .status-badge.on{color:var(--positive);border-color:var(--positive)}
.proj-title .status-badge.off{color:var(--dim)}
.proj-desc{font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.5}
.proj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.proj-tag{font-size:9px;padding:2px 8px;border:1px solid var(--border);color:var(--dim);text-transform:uppercase;letter-spacing:0.04em}
.proj-tag.port{color:var(--accent2)}
.proj-tag.tech{color:var(--accent)}
.proj-actions{display:flex;gap:6px}

/* BUTTONS */
.btn{font-family:var(--mono);font-size:10px;padding:5px 14px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all 0.2s;text-transform:uppercase;letter-spacing:0.03em}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn:disabled:hover{border-color:var(--border);color:var(--dim)}
.btn.start:hover{border-color:var(--positive);color:var(--positive)}
.btn.stop:hover{border-color:var(--danger);color:var(--danger)}
.btn.restart:hover{border-color:var(--warn);color:var(--warn)}
.btn.open:hover{border-color:var(--accent2);color:var(--accent2)}

/* ACTIVITY CHART (per project) */
.mini-chart{border:1px solid var(--border);background:rgba(255,255,255,0.01);padding:12px;margin-bottom:16px}
.mini-chart svg{width:100%;height:120px}
.commit-list{border:1px solid var(--border);background:var(--panel)}
.commit-list-header{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--sans);font-size:11px;font-weight:600}
.commit-item{padding:5px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px;display:flex;gap:10px}
.commit-item:hover{background:rgba(255,255,255,0.02)}
.commit-hash{color:var(--accent2);font-weight:500;min-width:60px}
.commit-date{color:var(--dim);min-width:70px;font-size:10px}
.commit-msg{color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* COMMANDS */
.cmd-card{border:1px solid var(--border);padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.cmd-card:hover{border-color:var(--border-bright)}
.cmd-left{flex:1;min-width:0}
.cmd-code{font-size:11px;color:var(--accent2);margin-bottom:2px;font-family:var(--mono)}
.cmd-desc{font-size:10px;color:var(--dim)}
.cmd-copy{font-family:var(--mono);font-size:9px;padding:3px 8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all 0.2s;flex-shrink:0}
.cmd-copy:hover{border-color:var(--accent);color:var(--accent)}
.cmd-copy.copied{color:var(--positive);border-color:var(--positive)}

/* WIKI */
.wiki-content{font-size:12px;line-height:1.7;max-width:700px}
.wiki-content h1{font-family:var(--sans);font-size:18px;font-weight:700;margin:16px 0 8px;color:var(--text)}
.wiki-content h2{font-family:var(--sans);font-size:14px;font-weight:600;margin:14px 0 6px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px}
.wiki-content h3{font-family:var(--sans);font-size:12px;font-weight:600;margin:10px 0 4px;color:var(--text)}
.wiki-content p{margin-bottom:8px}
.wiki-content ul,ol{margin:6px 0 6px 20px}
.wiki-content li{margin-bottom:3px}
.wiki-content code{background:rgba(255,255,255,0.05);padding:1px 4px;font-size:11px;color:var(--accent2)}
.wiki-content pre{background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:10px;margin:8px 0;overflow-x:auto;font-size:11px;line-height:1.5}
.wiki-content table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.wiki-content th,.wiki-content td{padding:5px 8px;border:1px solid var(--border);text-align:left}
.wiki-content th{font-size:9px;text-transform:uppercase;letter-spacing:0.04em;color:var(--dim);background:rgba(255,255,255,0.02)}
.wiki-content strong{color:var(--text)}
.wiki-content em{color:var(--dim)}
.wiki-source{font-size:9px;color:var(--dim);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)}
.wiki-empty{color:var(--dim);font-size:12px;padding:20px 0}

/* GLOBAL ACTIVITY (all projects) */
.global-chart{border:1px solid var(--border);background:rgba(255,255,255,0.01);padding:16px;margin-bottom:16px}
.global-chart svg{width:100%;height:280px}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
.legend-item .swatch{width:8px;height:8px}
.chart-tooltip{position:fixed;background:var(--panel);border:1px solid var(--border);padding:6px 10px;font-size:10px;line-height:1.4;pointer-events:none;z-index:100;max-width:300px;display:none}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--border);padding:8px 16px;font-size:11px;z-index:300;transform:translateY(60px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid var(--positive)}
.toast.error{border-left:3px solid var(--danger)}

/* EMPTY STATE */
.empty{color:var(--dim);text-align:center;padding:40px 20px;font-size:12px}

@media(max-width:700px){
  .sidebar{width:180px}
  .content{padding:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">STOPA<span>Command Center</span></div>
  <div class="top-stats" id="top-stats"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Projects</div>
    <div id="sidebar-list"></div>
    <div class="sidebar-header" style="margin-top:auto;border-top:1px solid var(--border)">Global</div>
    <div class="sidebar-item" id="nav-global">
      <span class="si-dot" style="background:var(--accent)"></span>
      <span class="si-name">All Projects</span>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty">Select a project from the sidebar</div>
  </div>
</div>

<div class="chart-tooltip" id="tooltip"></div>
<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────
let projects = [];
let selectedId = null;
let activeTab = 'activity';
let projectActivityCache = {};
let globalActivityCache = null;
let wikiCache = {};

const PROJECT_COLORS = {
  'monitor':'#38bdf8','ngrobot':'#c8b88a','adobe':'#a855f7',
  'grafik':'#22c55e','kartograf':'#eab308',
  'polybot':'#ef4444','ftip':'#ec4899','orakulum':'#14b8a6',
  'zachvev':'#f97316','rozhovor':'#6366f1','dane':'#84cc16','biolib':'#06b6d4'
};

// ─── Utils ───────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2500);
}

function copyCmd(btn, cmd) {
  navigator.clipboard.writeText(cmd);
  btn.textContent = 'copied';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
}

// ─── API ─────────────────────────────────────────────────────────────
async function fetchProjects() {
  try {
    const res = await fetch('/api/projects');
    projects = await res.json();
    renderSidebar();
    renderTopStats();
    if (selectedId) updateProjectHeader(selectedId);
  } catch (e) { console.error(e); }
}

async function projectAction(id, action) {
  try {
    const res = await fetch(`/api/projects/${id}/${action}`, { method: 'POST' });
    const data = await res.json();
    toast(data.ok ? `${action} ${id} — OK` : (data.error || 'Failed'), data.ok ? 'success' : 'error');
  } catch (e) { toast(e.message, 'error'); }
  setTimeout(fetchProjects, 1500);
}

async function fetchProjectActivity(id) {
  if (projectActivityCache[id]) return projectActivityCache[id];
  try {
    const res = await fetch(`/api/projects/${id}/git-log`);
    const data = await res.json();
    projectActivityCache[id] = data;
    return data;
  } catch { return []; }
}

async function fetchGlobalActivity() {
  if (globalActivityCache) return globalActivityCache;
  try {
    const res = await fetch('/api/activity');
    globalActivityCache = await res.json();
    return globalActivityCache;
  } catch { return []; }
}

async function fetchWiki(id) {
  if (wikiCache[id]) return wikiCache[id];
  try {
    const res = await fetch(`/api/projects/${id}/wiki`);
    const data = await res.json();
    wikiCache[id] = data;
    return data;
  } catch { return { content: null }; }
}

// ─── Top Stats ───────────────────────────────────────────────────────
function renderTopStats() {
  const running = projects.filter(p => p.running).length;
  document.getElementById('top-stats').innerHTML = `
    <div class="stat"><span class="dot ${running > 0 ? 'on' : 'off'}"></span><span class="v">${running}</span>/${projects.length} running</div>
  `;
}

// ─── Sidebar ─────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = projects.map(p => {
    const portLabel = p.port ? `:${p.port}` : 'CLI';
    return `
    <div class="sidebar-item ${p.running ? 'running' : 'stopped'} ${selectedId === p.id ? 'active' : ''}"
         data-pid="${p.id}">
      <span class="si-dot"></span>
      <span class="si-name">${p.name}</span>
      <span class="si-port">${portLabel}</span>
    </div>
    `;
  }).join('');
  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => selectProject(el.dataset.pid));
  });
}

// ─── Select Project ──────────────────────────────────────────────────
function selectProject(id) {
  selectedId = id;
  renderSidebar();
  renderProject(id);
  // Remove active from global nav
  document.getElementById('nav-global').classList.remove('active');
}

function renderProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  const content = document.getElementById('content');
  const statusCls = p.running ? 'on' : 'off';
  const statusText = p.running ? 'RUNNING' : 'STOPPED';

  content.innerHTML = `
    <div class="proj-header">
      <div class="proj-title">
        ${p.name}
        <span class="status-badge ${statusCls}">${statusText}</span>
      </div>
      <div class="proj-desc">${p.desc}</div>
      <div class="proj-tags">
        ${p.port ? `<span class="proj-tag port" style="${p.running ? 'color:var(--positive)' : ''}">:${p.port}${p.running ? ' ●' : ''}</span>` : '<span class="proj-tag">CLI only</span>'}
        ${(p.extraPorts||[]).map(pp => {
          const up = p.portStatus?.[pp.label];
          return `<span class="proj-tag port" style="${up ? 'color:var(--positive)' : ''}">${pp.label} :${pp.port}${up ? ' ●' : ''}</span>`;
        }).join('')}
        <span class="proj-tag tech">${p.tech}</span>
        ${(p.stack||[]).map(s => `<span class="proj-tag">${s}</span>`).join('')}
      </div>
      ${p.cmd ? `<div class="proj-actions">
        <button class="btn start" ${p.running ? 'disabled' : ''}>Start</button>
        <button class="btn stop" ${!p.running ? 'disabled' : ''}>Stop</button>
        <button class="btn restart">Restart</button>
        ${p.running ? `<button class="btn open">Open</button>` : ''}
      </div>` : ''}
    </div>
    <div class="overview-tab" id="ov-tabs">
      <label class="${activeTab==='activity'?'active':''}" data-tab="activity">Activity</label>
      <label class="${activeTab==='commands'?'active':''}" data-tab="commands">Commands</label>
      <label class="${activeTab==='wiki'?'active':''}" data-tab="wiki">Wiki</label>
    </div>
    <div class="ov-panel ${activeTab==='activity'?'active':''}" id="ov-activity"><div class="empty">Loading...</div></div>
    <div class="ov-panel ${activeTab==='commands'?'active':''}" id="ov-commands"></div>
    <div class="ov-panel ${activeTab==='wiki'?'active':''}" id="ov-wiki"><div class="empty">Loading...</div></div>
  `;

  // Bind events after innerHTML
  content.querySelectorAll('.proj-actions .btn').forEach(btn => {
    if (btn.classList.contains('start')) btn.addEventListener('click', () => projectAction(p.id, 'start'));
    else if (btn.classList.contains('stop')) btn.addEventListener('click', () => projectAction(p.id, 'stop'));
    else if (btn.classList.contains('restart')) btn.addEventListener('click', () => projectAction(p.id, 'restart'));
    else if (btn.classList.contains('open')) btn.addEventListener('click', () => window.open(`http://127.0.0.1:${p.port}`, '_blank'));
  });
  content.querySelectorAll('#ov-tabs label').forEach(label => {
    label.addEventListener('click', () => switchOvTab(label));
  });

  renderCommands(p);
  loadProjectActivity(p);
}

// Update only status badge + buttons without re-rendering entire panel
function updateProjectHeader(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  const badge = document.querySelector('.status-badge');
  if (badge) {
    badge.textContent = p.running ? 'RUNNING' : 'STOPPED';
    badge.className = `status-badge ${p.running ? 'on' : 'off'}`;
  }
  const startBtn = document.querySelector('.proj-actions .btn.start');
  const stopBtn = document.querySelector('.proj-actions .btn.stop');
  if (startBtn) startBtn.disabled = p.running;
  if (stopBtn) stopBtn.disabled = !p.running;
  // Add/remove Open button
  const actions = document.querySelector('.proj-actions');
  const openBtn = actions?.querySelector('.btn.open');
  if (p.running && !openBtn && actions) {
    const btn = document.createElement('button');
    btn.className = 'btn open';
    btn.textContent = 'Open';
    btn.addEventListener('click', () => window.open(`http://127.0.0.1:${p.port}`, '_blank'));
    actions.appendChild(btn);
  } else if (!p.running && openBtn) {
    openBtn.remove();
  }
}

function switchOvTab(label) {
  document.querySelectorAll('#ov-tabs label').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.ov-panel').forEach(p => p.classList.remove('active'));
  label.classList.add('active');
  const tab = label.dataset.tab;
  activeTab = tab;
  document.getElementById(`ov-${tab}`).classList.add('active');

  if (tab === 'wiki' && selectedId) loadWiki(selectedId);
}

// ─── Commands Tab ────────────────────────────────────────────────────
function renderCommands(p) {
  const el = document.getElementById('ov-commands');
  if (!p.commands || !p.commands.length) {
    el.innerHTML = '<div class="empty">No commands defined</div>';
    return;
  }
  el.innerHTML = p.commands.map(c => `
    <div class="cmd-card">
      <div class="cmd-left">
        <div class="cmd-code">${c.cmd}</div>
        <div class="cmd-desc">${c.desc}</div>
      </div>
      <button class="cmd-copy" data-cmd="${c.cmd.replace(/"/g,'&quot;')}">copy</button>
    </div>
  `).join('');
  el.querySelectorAll('.cmd-copy').forEach(btn => {
    btn.addEventListener('click', () => copyCmd(btn, btn.dataset.cmd));
  });
}

// ─── Activity Tab (per project) ──────────────────────────────────────
async function loadProjectActivity(p) {
  const commits = await fetchProjectActivity(p.id);
  const el = document.getElementById('ov-activity');
  if (!commits.length) { el.innerHTML = '<div class="empty">No git history</div>'; return; }

  // Mini bar chart: commits per day (last 30 days)
  const dayMap = {};
  const now = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now - i * 86400000);
    dayMap[d.toISOString().split('T')[0]] = 0;
  }
  // git-log doesn't have dates, use index as proxy — or fetch activity
  // Use global activity for this project instead
  const activity = await fetchGlobalActivity();
  const projActivity = activity.filter(a => a.project === p.id);
  projActivity.forEach(a => {
    const day = a.date.split('T')[0];
    if (dayMap[day] !== undefined) dayMap[day]++;
  });

  const days = Object.keys(dayMap);
  const vals = Object.values(dayMap);
  const maxVal = Math.max(...vals, 1);

  const W = 600, H = 120, PAD = { left: 30, right: 10, top: 10, bottom: 20 };
  const plotW = W - PAD.left - PAD.right;
  const barW = plotW / days.length - 1;
  const color = PROJECT_COLORS[p.id] || '#c8b88a';

  let svg = '';
  days.forEach((day, i) => {
    const x = PAD.left + i * (plotW / days.length);
    const h = (vals[i] / maxVal) * (H - PAD.top - PAD.bottom);
    const y = H - PAD.bottom - h;
    if (vals[i] > 0) {
      svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" opacity="0.7"/>`;
    }
    // Label every 5 days
    if (i % 5 === 0) {
      const d = new Date(day);
      svg += `<text x="${x}" y="${H - 4}" font-size="8" fill="#5a6270" font-family="var(--mono)">${d.getDate()}.${d.getMonth()+1}</text>`;
    }
  });
  // Y axis labels
  svg += `<text x="${PAD.left-4}" y="${PAD.top+6}" text-anchor="end" font-size="8" fill="#5a6270" font-family="var(--mono)">${maxVal}</text>`;
  svg += `<text x="${PAD.left-4}" y="${H-PAD.bottom}" text-anchor="end" font-size="8" fill="#5a6270" font-family="var(--mono)">0</text>`;
  svg += `<line x1="${PAD.left}" y1="${H-PAD.bottom}" x2="${W-PAD.right}" y2="${H-PAD.bottom}" stroke="#1a1f2a"/>`;

  const totalCommits = projActivity.length;
  const totalFiles = projActivity.reduce((s,a) => s + a.files, 0);
  const totalIns = projActivity.reduce((s,a) => s + a.insertions, 0);
  const totalDel = projActivity.reduce((s,a) => s + a.deletions, 0);

  el.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:12px;font-size:10px;color:var(--dim)">
      <span>Last 30 days: <strong style="color:var(--text)">${totalCommits}</strong> commits</span>
      <span><strong style="color:var(--text)">${totalFiles}</strong> files changed</span>
      <span style="color:var(--positive)">+${totalIns}</span>
      <span style="color:var(--danger)">-${totalDel}</span>
    </div>
    <div class="mini-chart"><svg viewBox="0 0 ${W} ${H}">${svg}</svg></div>
    <div class="commit-list">
      <div class="commit-list-header">Recent Commits (${commits.length})</div>
      ${commits.slice(0,30).map(c => `
        <div class="commit-item">
          <span class="commit-hash">${c.hash.substring(0,7)}</span>
          <span class="commit-msg">${escHtml(c.message)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Wiki Tab ────────────────────────────────────────────────────────
async function loadWiki(id) {
  const el = document.getElementById('ov-wiki');
  const data = await fetchWiki(id);
  if (!data.content) { el.innerHTML = '<div class="wiki-empty">No CLAUDE.md or README.md found for this project.</div>'; return; }
  el.innerHTML = `
    <div class="wiki-content">${renderMarkdown(data.content)}</div>
    <div class="wiki-source">Source: ${data.source}</div>
  `;
}

function renderMarkdown(md) {
  // Minimal markdown renderer — headings, code blocks, lists, bold, italic, inline code
  let html = '';
  let inCode = false;
  let inList = false;
  const lines = md.split('\n');
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    // Code blocks
    if (line.startsWith('```')) {
      if (inCode) { html += '</pre>'; inCode = false; }
      else { html += '<pre>'; inCode = true; }
      continue;
    }
    if (inCode) { html += escHtml(line) + '\n'; continue; }
    // Close list if needed
    if (inList && !line.match(/^[-*]\s/) && !line.match(/^\d+\.\s/) && line.trim()) {
      html += '</ul>'; inList = false;
    }
    // Headings
    if (line.startsWith('### ')) { html += `<h3>${inlineFormat(line.substring(4))}</h3>`; continue; }
    if (line.startsWith('## ')) { html += `<h2>${inlineFormat(line.substring(3))}</h2>`; continue; }
    if (line.startsWith('# ')) { html += `<h1>${inlineFormat(line.substring(2))}</h1>`; continue; }
    // Lists
    if (line.match(/^[-*]\s/)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inlineFormat(line.substring(2))}</li>`;
      continue;
    }
    // Empty line
    if (!line.trim()) { html += '<br>'; continue; }
    // Paragraph
    html += `<p>${inlineFormat(line)}</p>`;
  }
  if (inCode) html += '</pre>';
  if (inList) html += '</ul>';
  return html;
}

function inlineFormat(str) {
  str = escHtml(str);
  str = str.replace(/`([^`]+)`/g, '<code>$1</code>');
  str = str.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  str = str.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return str;
}

// ─── Global View ─────────────────────────────────────────────────────
async function showGlobal() {
  selectedId = null;
  renderSidebar();
  document.getElementById('nav-global').classList.add('active');
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty">Loading global activity...</div>';

  const activity = await fetchGlobalActivity();
  if (!activity.length) { content.innerHTML = '<div class="empty">No commits in last 30 days</div>'; return; }

  const projectIds = [...new Set(activity.map(d => d.project))];
  const now = new Date();
  const ago = new Date(now - 30 * 86400000);

  // Build SVG scatter plot
  const W = 800, H = 280;
  const PAD = { top: 20, right: 20, bottom: 30, left: 100 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const xScale = d => PAD.left + ((new Date(d.date) - ago) / (now - ago)) * plotW;
  const yMap = {};
  projectIds.forEach((id, i) => { yMap[id] = PAD.top + (i + 0.5) * (plotH / projectIds.length); });

  let svg = '';
  // Grid
  for (let i = 0; i <= 4; i++) {
    const x = PAD.left + (i / 4) * plotW;
    const d = new Date(ago.getTime() + (i / 4) * (now - ago));
    svg += `<line x1="${x}" y1="${PAD.top}" x2="${x}" y2="${H-PAD.bottom}" stroke="#1a1f2a" stroke-dasharray="2,4"/>`;
    svg += `<text x="${x}" y="${H-8}" text-anchor="middle" fill="#5a6270" font-family="var(--mono)" font-size="9">${d.getDate()}.${d.getMonth()+1}</text>`;
  }
  // Project labels + lines
  projectIds.forEach(id => {
    const y = yMap[id];
    const name = activity.find(d => d.project === id)?.name || id;
    svg += `<text x="${PAD.left-6}" y="${y+3}" text-anchor="end" fill="${PROJECT_COLORS[id]||'#5a6270'}" font-family="var(--mono)" font-size="9">${name}</text>`;
    svg += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#1a1f2a" stroke-dasharray="1,6"/>`;
  });
  // Dots
  activity.forEach((d, i) => {
    const x = xScale(d);
    const y = yMap[d.project];
    const r = Math.min(2 + Math.sqrt(d.files) * 1.5, 8);
    svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="${PROJECT_COLORS[d.project]||'#5a6270'}" opacity="0.7" data-idx="${i}" class="gdot" style="cursor:pointer"/>`;
  });

  const legend = projectIds.map(id => {
    const count = activity.filter(d => d.project === id).length;
    const name = activity.find(d => d.project === id)?.name || id;
    return `<div class="legend-item"><span class="swatch" style="background:${PROJECT_COLORS[id]||'#5a6270'}"></span>${name} (${count})</div>`;
  }).join('');

  content.innerHTML = `
    <div class="proj-header">
      <div class="proj-title">All Projects — Activity</div>
      <div class="proj-desc">Commit activity across all ${projectIds.length} projects over the last 30 days (${activity.length} total commits)</div>
    </div>
    <div class="global-chart">
      <svg id="global-svg" viewBox="0 0 ${W} ${H}">${svg}</svg>
      <div class="chart-legend">${legend}</div>
    </div>
    <div class="commit-list">
      <div class="commit-list-header">Recent Commits (showing 50 of ${activity.length})</div>
      ${activity.slice(0,50).map(d => {
        const date = new Date(d.date).toLocaleDateString('cs-CZ', {day:'numeric',month:'short'});
        return `<div class="commit-item">
          <span class="commit-hash">${d.hash.substring(0,7)}</span>
          <span style="color:${PROJECT_COLORS[d.project]||'#5a6270'};min-width:100px;font-size:10px">${d.name}</span>
          <span class="commit-date">${date}</span>
          <span class="commit-msg">${escHtml(d.message)}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Tooltips
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.gdot').forEach(dot => {
    dot.addEventListener('mouseenter', e => {
      const d = activity[parseInt(dot.dataset.idx)];
      const date = new Date(d.date).toLocaleDateString('cs-CZ');
      tooltip.innerHTML = `<strong style="color:${PROJECT_COLORS[d.project]}">${d.name}</strong><br>${date}<br>${escHtml(d.message)}<br><span style="color:var(--dim)">${d.files} files, +${d.insertions} -${d.deletions}</span>`;
      tooltip.style.display = 'block';
      tooltip.style.left = e.clientX + 12 + 'px';
      tooltip.style.top = e.clientY - 10 + 'px';
    });
    dot.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}

// ─── Init ────────────────────────────────────────────────────────────
document.getElementById('nav-global').addEventListener('click', showGlobal);
fetchProjects();
setInterval(fetchProjects, 5000);
</script>
